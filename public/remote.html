<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nature Canopy Remote</title>
  <style>
    :root {
      --bg: #09131c;
      --panel: #102234;
      --text: #ecf6ff;
      --muted: #9bb6cc;
      --accent: #49b5ff;
      --accent-2: #58c783;
      --danger: #f26e5d;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at 20% 10%, #1b3449 0%, var(--bg) 45%, #050b11 100%);
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }

    .status {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .panel {
      background: color-mix(in srgb, var(--panel) 84%, transparent);
      border: 1px solid rgba(113, 160, 199, 0.3);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(6px);
    }

    .buttons {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    button {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 12px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 12px;
      touch-action: manipulation;
    }

    button:active { transform: translateY(1px); }

    #btn-storm { background: linear-gradient(120deg, #8e5cf7, #4f7bff); }
    #btn-clear { background: linear-gradient(120deg, #27804f, var(--accent-2)); }
    #btn-day { background: linear-gradient(120deg, #f7b84f, #e98d3b); }
    #btn-night { background: linear-gradient(120deg, #203245, var(--accent)); }

    .log {
      margin-top: 14px;
      min-height: 22px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Nature Canopy Remote</h1>
    <p id="status" class="status">Connecting…</p>

    <section class="panel">
      <div class="buttons">
        <button id="btn-storm" type="button">Trigger Storm</button>
        <button id="btn-clear" type="button">Clear Weather</button>
        <button id="btn-day" type="button">Day Mode</button>
        <button id="btn-night" type="button">Night Mode</button>
      </div>
      <div id="log" class="log"></div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="remote.js"></script>
</body>
</html>
