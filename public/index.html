<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature Canopy Vibes</title>
  <style>
    /* Edge-to-edge, no chrome — critical for ceiling projection */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; }

    #qr-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #qr-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #qr-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .qr-text {
      text-align: center;
      max-width: 600px;
      font-size: 1.2rem;
      line-height: 1.5;
    }
    .qr-subtext {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div id="qr-overlay">
    <div id="qr-container">
      <canvas id="qr-canvas"></canvas>
    </div>
    <div class="qr-text">
      <strong>Scan to Control Projector</strong><br>
      Use your phone to change the location, weather, and time of day.
    </div>
    <div class="qr-subtext">
      Press 'q' or click anywhere to dismiss this screen. Press 'q' anytime to show it again.
    </div>
  </div>

  <!-- 1. p5.js — pinned version for Raspberry Pi stability -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <!-- PeerJS and QRCode for standalone WebRTC control -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // CDN fallback for environments where jsDelivr is blocked.
    if (typeof QRCode === 'undefined') {
      document.write('<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"><\\/script>');
    }
  </script>

  <!-- 2. Standalone mode — must load BEFORE socket.io so window.io is always defined.
       On a real server, socket.io loads next and overwrites window.io with the real client.
       On GitHub Pages (static hosting), socket.io 404s and the standalone mock stays in place. -->
  <script src="standalone.js"></script>

  <!-- 3. Socket.io client — auto-served by the Socket.io server (no-op 404 on static hosting) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- 4. Visual subsystems (order matters: each builds on the previous) -->
  <script src="stars.js"></script>
  <script src="murmuration.js"></script>
  <script src="canopy.js"></script>
  <script src="creatures.js"></script>
  <script src="atmosphere.js"></script>

  <!-- 5. Control panel — injects its own DOM/CSS, exposes _ncv* globals -->
  <script src="controls.js"></script>

  <!-- 6. Main sketch — initialises everything, runs the render loop -->
  <!-- Safety net: standalone.js should have set window.io, but if anything prevented
       it from running (CSP, network error, etc.) this guarantees io() never throws. -->
  <script>
    if (!window.io) {
      window.io = function() {
        var ev = {};
        var sock = {
          id: 'offline', connected: false,
          on:   function(e, cb) { (ev[e] = ev[e] || []).push(cb); },
          emit: function() {}
        };
        // Fire 'connect' asynchronously so sketch.js behaves like it connected
        setTimeout(function() {
          (ev['connect'] || []).forEach(function(cb) { try { cb(); } catch(e) {} });
        }, 50);
        return sock;
      };
    }
  </script>
  <script src="sketch.js"></script>

</body>
</html>
